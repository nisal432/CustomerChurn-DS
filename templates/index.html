<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Customer Churn Predictor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            width: 700px;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.9em;
        }
        select, input[type="number"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background: #45a049;
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 5px;
            background: #f9f9f9;
            text-align: center;
        }
        .prediction {
            font-size: 24px;
            font-weight: bold;
            margin: 10px 0;
        }
        .risk-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏦 Bank Customer Churn Predictor</h1>
        <form action="/predict" method="POST">
            <div class="form-grid">
                <div>
                    <label>Credit Score</label>
                    <input type="number" name="creditscore" min="300" max="900" value="650" required>
                </div>
                <div>
                    <label>Country</label>
                    <select name="country">
                        <option value="France">France</option>
                        <option value="Germany">Germany</option>
                        <option value="Spain">Spain</option>
                    </select>
                </div>
                <div>
                    <label>Gender</label>
                    <select name="gender">
                        <option value="Female">Female</option>
                        <option value="Male">Male</option>
                    </select>
                </div>
                <div>
                    <label>Age</label>
                    <input type="number" name="age" min="18" max="100" value="35" required>
                </div>
                <div>
                    <label>Tenure (years)</label>
                    <input type="number" name="tenure" min="0" max="10" value="5" required>
                </div>
                <div>
                    <label>Balance</label>
                    <input type="number" name="balance" min="0" step="0.01" value="50000" required>
                </div>
                <div>
                    <label>Number of Products</label>
                    <select name="products_number">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                    </select>
                </div>
                <div>
                    <label>Has Credit Card?</label>
                    <select name="credit_card">
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>
                <div>
                    <label>Is Active Member?</label>
                    <select name="active_member">
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>
                <div>
                    <label>Estimated Salary</label>
                    <input type="number" name="estimatedsalary" min="0" step="0.01" value="50000" required>
                </div>
            </div>
            <button type="submit">Predict Churn Risk</button>
        </form>

        {% if prediction %}
        <div class="result">
            <h2>Prediction Result</h2>
            <p class="prediction" style="color: {{ color }};">{{ risk }}% Churn Risk</p>
            <span class="risk-badge" style="background-color: {{ color }};">{{ risk_level }} Risk</span>
            <p style="margin-top:15px;"><strong>Most influential features (global):</strong><br>
            {{ top_factors|join(', ') }}</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
